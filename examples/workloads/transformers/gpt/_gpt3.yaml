{% set ATTENTION = include("multi_head.yaml", "") %}
{% set FEEDFORWARD = include("dense_two_layer.yaml", "") %}

workload:
  rank_sizes:
    <<<: [{{ATTENTION}}.workload.rank_sizes, {{FEEDFORWARD}}.workload.rank_sizes]

  bits_per_value: {All: 16}
  persistent_tensors: weight - Intermediates

  einsums:
  # Attention: QKV c_attn L102, QK/softmax/AV 93-98, out proj L111
  - {{ATTENTION}}.workload.einsums
  # MLP: c_fc/c_proj 118-119
  - {{FEEDFORWARD}}.workload.einsums
