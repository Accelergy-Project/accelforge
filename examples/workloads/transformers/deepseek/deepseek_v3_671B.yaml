{{add_to_path(".")}}

# DeepSeek-V3 671B one decoder layer. The full model includes embedding + 61 of these.
# The first 3 layers are dense and the rest are MoE. The model uses multi-head latent
# attention and a feedforward chosen by FEEDFORWARD_TYPE ('dense' for first 3 layers,
# 'moe' for the others).
#
# Set BATCH_SIZE, DECODE, N_NEW_TOKENS, FEEDFORWARD_TYPE. If DECODE, also set
# N_CACHED_TOKENS. FEEDFORWARD_TYPE selects the feedforward: 'moe' (layers 4-61,
# default) or 'dense' (layers 1-3, config.json#L15).
#
# config.json:
# https://huggingface.co/deepseek-ai/DeepSeek-V3/blob/e815299b0bcbac849fa540c768ef21845365c9eb/config.json
# paper: https://arxiv.org/abs/2412.19437

{% set FEEDFORWARD_TYPE = FEEDFORWARD_TYPE | default("moe") %}
{% set N_HEADS = 128 %}           # num_attention_heads   config.json#L29
{% set N_EMB_PER_HEAD = 128 %}    # qk_nope_head_dim (RoPE dim ignored here)   config.json#L35
{% set N_V_DIMS = 128 %}          # v_head_dim   config.json#L65
{% set N_Q_LATENT = 1536 %}       # q_lora_rank   config.json#L34
{% set N_KV_LATENT = 512 %}       # kv_lora_rank   config.json#L20
{% set N_HIDDEN_DIMS = 7168 %}    # hidden_size   config.json#L17
{% set N_FF_DIMS = 18432 if FEEDFORWARD_TYPE == "dense" else 2048 %} # intermediate_size L19 (dense) / moe_intermediate_size L23 (moe)
{% set N_SHARED_FF_DIMS = 2048 %} # shared expert = moe_intermediate_size (n_shared_experts=1)   config.json#L23,L27
{% set N_EXPERTS = 256 %}         # n_routed_experts   config.json#L26
{% set N_EXPERTS_PER_TOKEN = 8 %} # num_experts_per_tok   config.json#L30
{% set MAX_N_TOKENS = MAX_N_TOKENS | default(163840) %}   # max_position_embeddings   config.json#L21
{% set MODEL = include("_deepseek_v3.yaml", "") %}
workload: {{MODEL}}.workload
renames: {{MODEL}}.renames
