{% set FEEDFORWARD_TYPE = FEEDFORWARD_TYPE | default("moe") %}
{% set ABSORBED = ABSORBED | default(True) %}
{% set ATTENTION = include("multi_head_latent.yaml", "") %}
{% assert FEEDFORWARD_TYPE in ['moe', 'dense'], "FEEDFORWARD_TYPE must be 'moe' or 'dense'." %}
{% set FEEDFORWARD = include("mixture_of_experts_shared.yaml", "") if FEEDFORWARD_TYPE == "moe" else include("gated_linear_unit.yaml", "") %}

workload:
  rank_sizes:
    <<<: [{{ATTENTION}}.workload.rank_sizes, {{FEEDFORWARD}}.workload.rank_sizes]

  bits_per_value:
    # 16b operands

    # Attention QK and QK softmax
    QK: 16
    QK_softmax: 16

    # Latent tensors when we perform the absorbed version
    {% if ABSORBED %}
    CKV: 16
    {% if DECODE %}
    CKV_cache: 16
    {% endif %}
    Q_latent: 16

    # Q, K, V when we do not absorb the latent tensors
    {% else %}
    Q: 16
    K: 16
    V: 16
    {% endif %}
    # Some GLU tensors
    FFG: 16
    FFU: 16
    FFB: 16
    {% if FEEDFORWARD_TYPE == "moe" %}
    # Some MoE tensors
    SFG: 16
    SFU: 16
    SFB: 16
    FFD: 16
    RFFB: 16
    {% endif %}
    Other: 8

  persistent_tensors: weight - Intermediates

  einsums:
  # Lines 344-360 implement projections. QK/softmax/AV are 265-272. Out projection is
  # 360.
  - {{ATTENTION}}.workload.einsums
  # DeepSeekMoE: router L104, routed experts L159, shared expert L166/L202. Dense MLP L87.
  - {{FEEDFORWARD}}.workload.einsums
