{{add_to_path(".")}}

# Qwen3 one decoder layer. The full model is embedding + 48 of these (num_hidden_layers)
# + final normalization and unembedding.
#
# Set BATCH_SIZE, DECODE, N_NEW_TOKENS. If DECODE, also set N_CACHED_TOKENS.
#
# config.json:
# https://huggingface.co/Qwen/Qwen3-30B-A3B/blob/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39/config.json

{% set FEEDFORWARD_TYPE = 'moe' %}
{% set N_HEADS = 4 %}                # num_key_value_heads   config.json#L25
{% set N_Q_HEADS_PER_KV_HEAD = 8 %}  # num_attention_heads/num_key_value_heads = 32/4   config.json#L21,L25
{% set N_EMB_PER_HEAD = 128 %}       # head_dim   config.json#L10
{% set N_HIDDEN_DIMS = 2048 %}       # hidden_size (!= num_heads*head_dim)   config.json#L12
{% set N_FF_DIMS = 768 %}            # moe_intermediate_size   config.json#L19
{% set N_EXPERTS = 128 %}            # num_experts   config.json#L22
{% set N_EXPERTS_PER_TOKEN = 8 %}    # num_experts_per_tok   config.json#L23
{% set MAX_N_TOKENS = MAX_N_TOKENS | default(40960) %}       # max_position_embeddings   config.json#L15
{% set MODEL = include("_qwen3.yaml", "") %}
workload: {{MODEL}}.workload
renames: {{MODEL}}.renames
