{% set FEEDFORWARD_TYPE = FEEDFORWARD_TYPE | default("dense") %}
{% set ATTENTION = include("grouped_query.yaml", "") %}
{% assert FEEDFORWARD_TYPE in ['moe', 'dense'], "FEEDFORWARD_TYPE must be 'moe' or 'dense'." %}
{% set FEEDFORWARD = include("mixture_of_experts.yaml", "") if FEEDFORWARD_TYPE == "moe" else include("gated_linear_unit.yaml", "") %}

workload:
  rank_sizes:
    <<<: [{{ATTENTION}}.workload.rank_sizes, {{FEEDFORWARD}}.workload.rank_sizes]

  bits_per_value: {All: 16}
  persistent_tensors: weight - Intermediates

  einsums:
  # Attention: q/k/v/o proj 173-182, scores 147-154
  - {{ATTENTION}}.workload.einsums
  # FFN: dense gate/up/down 78-84 / MoE expert 205-211, router 233
  - {{FEEDFORWARD}}.workload.einsums
