{{add_to_path(".")}}

# Llama 4 Scout 17B-16E one decoder layer. The full model is an embedding + 48 of these
# (num_hidden_layers) + final normalization and unembedding. Every 4th layer is global
# context, and others use local context with chunked attention size 8192.
#
# Set BATCH_SIZE, DECODE, N_NEW_TOKENS. If DECODE, also set N_CACHED_TOKENS.
#
# config.json:
# https://huggingface.co/unsloth/Llama-4-Scout-17B-16E/blob/62d69dc0a79bb9251fe44d1397ddf34fc23e1068/config.json

{% set FEEDFORWARD_TYPE = 'moe' %}
{% assert ATTENTION_TYPE in ['chunked_local', 'grouped_query'], "ATTENTION_TYPE must be 'chunked_local' or 'grouped_query'." %}
{% assert FEEDFORWARD_TYPE in ['moe', 'dense'], "FEEDFORWARD_TYPE must be 'moe' or 'dense'." %}
{% set N_HEADS = 8 %}                # num_key_value_heads   config.json#L33
{% set N_Q_HEADS_PER_KV_HEAD = 5 %}  # num_attention_heads/num_key_value_heads = 40/8   config.json#L30,L33
{% set N_EMB_PER_HEAD = 128 %}       # head_dim   config.json#L20
{% set N_HIDDEN_DIMS = 5120 %}       # hidden_size   config.json#L22
{% set N_FF_DIMS = 8192 %}           # intermediate_size (expert)   config.json#L25
{% set N_SHARED_FF_DIMS = 8192 %}    # shared expert = intermediate_size   config.json#L25
{% set N_EXPERTS = 16 %}             # num_local_experts (Scout)   config.json#L34
{% set N_EXPERTS_PER_TOKEN = 1 %}    # num_experts_per_tok   config.json#L31
{% set MAX_N_TOKENS = MAX_N_TOKENS | default(10485760) %}
{% set MODEL = include("_llama4.yaml", "") %}
workload: {{MODEL}}.workload
renames: {{MODEL}}.renames
