workload:
  rank_sizes:
    {% set BATCH_SIZE = BATCH_SIZE | default(1) %}
    {% set N_TOKENS = N_TOKENS | default(8192) %}
    {% set N_NEW_TOKENS = N_NEW_TOKENS | default(1) %}
    {% set N_HEADS = N_HEADS | default(128) %}
    {% set N_EMB_PER_HEAD = N_EMB_PER_HEAD | default(128) %}
    {% set N_LATENT_DIMS = N_LATENT_DIMS | default(512+64) %}  # 64 is RoPE included here
    {% set N_HIDDEN_DIMS = N_HIDDEN_DIMS | default(7*1024) %}
    B: {{BATCH_SIZE}}
    P: {{N_TOKENS}}
    M: {{N_NEW_TOKENS}}
    H: {{N_HEADS}}
    E: {{N_EMB_PER_HEAD}}
    F: {{N_EMB_PER_HEAD}}
    DC: {{N_LATENT_DIMS}}
    D: {{N_HIDDEN_DIMS}}
    G: {{N_HIDDEN_DIMS}}

  bits_per_value: {All: 8}
  persistent_tensors: weight - Intermediates

  einsums:
  - einsum: "I[b, m, d] = I_in[b, m, d]"
    is_copy_operation: True

  - "CQ_new[b, m, dc] = I[b, m, d] * WCQ[d, dc]"
  - "CKV_new[b, m, dc] = I[b, m, d] * WCKV[d, dc]"

  - einsum: "V[b, p, h, f] = CKV[b, p, dc] * WV[h, f, dc]"
    renames: {input: CKV}
  - einsum: "K[b, p, h, e] = CKV[b, p, dc] * WK[h, e, dc]"
    renames: {input: CKV}

  - "Q[b, m, h, e] = CQ_new[b, m, dc] * WQ[h, e, dc]"

  - einsum: "QK[b, m, p, h] = Q[b, m, h, e] * K[b, p, h, e]"
    renames: {input: Q}
  - "QK_softmax[b, m, p, h] = QK[b, m, p, h]"

  - einsum: "AV[b, m, h, f] = QK_softmax[b, m, p, h] * V[b, p, h, f]"
    renames: {input: QK_softmax}
  - "Z[b, m, g] = AV[b, m, h, f] * WZ[h, f, g]"

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates if len(All) == 3 else Inputs
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1 if len(All) == 3 else 0
