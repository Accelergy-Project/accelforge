# This architecture is used to generate Orojenesis ski-slope that show the tradeoff
# between the size of a memory and the minimum number of accesses to parent memories.
# These trade-offs are introduced in "Mind the Gap: Attainable Data Movement and
# Operational Intensity Bounds for Tensor Algorithms" by Qijing Huang, Po-An Tsai, Joel
# S. Emer, Angshuman Parashar.

# See the memory_size_vs_access_tradeoff.ipynb notebook for more details.

# Use this to add additional constraints to MainMemory and GlobalBuffer (GLB)
{% set ADDITIONAL_MAINMEMORY_CONSTRAINTS = ADDITIONAL_MAINMEMORY_CONSTRAINTS | default(dict()) %}
{% set ADDITIONAL_GLB_CONSTRAINTS = ADDITIONAL_GLB_CONSTRAINTS | default(dict()) %}

arch:
  nodes:
  # Set main memory read and write energy to 1J/bit. Then, when we set the mapper to
  # minimize energy, it will really just be minimizing the number of DRAM accesses.
  - !Memory
    name: MainMemory
    component_class: Dummy
    size: inf
    actions: [{name: read, energy: 1}, {name: write, energy: 1}]
    # Keep only intermediates -> allow fusion
    tensors:
      {% if "keep" not in ADDITIONAL_MAINMEMORY_CONSTRAINTS %}
      keep: ~Intermediates
      {% endif %}
      {% if "may_keep" not in ADDITIONAL_MAINMEMORY_CONSTRAINTS %}
      may_keep: All
      {% endif %}
      {% for key, value in ADDITIONAL_MAINMEMORY_CONSTRAINTS.items() %}
      {{key}}: {{value}}
      {% endfor %}

  # We'll set up the mapper to also optimize for global buffer usage. We make it large
  # enough that it'll never reasonably be oversubscribed, then count the usage as the
  # "size" of our global buffer. Note that we cannot set the size to infinity, as usage
  # would be zero and there would be nothing to optimize for.
  - !Memory
    name: GlobalBuffer
    component_class: Dummy
    size: 1e15
    tensors:
      {% if "keep" not in ADDITIONAL_GLB_CONSTRAINTS %}
      keep: All
      {% endif %}
      {% for key, value in ADDITIONAL_GLB_CONSTRAINTS.items() %}
      {{key}}: {{value}}
      {% endfor %}

  - !Compute
    name: MAC
    component_class: Dummy
