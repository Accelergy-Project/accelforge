{{include_text('_include.yaml')}}
{{add_to_path('./memory_cells')}}

arch:
  # ===================================================================================
  # Architecture-specific variables.
  # ===================================================================================
  variables:
    # Inherit these from _include.yaml. Many definitions are included there.
    <<: *variables_global

    # Encoding-dependent parameters ---------------------------------------------------
    encoded_input_bits:  input_bits
    encoded_weight_bits: weight_bits
    encoded_output_bits: output_bits

    input_encoding_func: offset_encode_hist
    weight_encoding_func: offset_encode_hist

    # For accuracy model. Can in-array accumulation include signed values? Signed
    # accumulation not compatible with offset encoding (since offset encoding makes
    # values non-negative)
    signed_sum_across_inputs: False
    signed_sum_across_weights: False

    # Architecture & CiM Array Structure ----------------------------------------------
    # DEFINITIONS:
    # - Cell: Smallest structure capable of storing memory. Note that a cell may store
    #   more than one bit. For example, a cell consisting of a RRAM device may store >1
    #   bits, while a cell consisting of an SRAM bitcell may store only 1 bit.
    # - CiM Unit: Smallest structure capable of computing an analog MAC
    # - CiM Unit Width Cells: Number of CiM unit cells that are accessed as one. These
    #   cells receive one analog input and compute one analog MAC per timestep.
    # - CiM Unit Depth Cells: Number of independent groups of "CiM Unit Width" cells
    #   that form a CiM unit. Each of these groups is indepently addressible and
    #   operates in must be activated in a different timestep than the others.
    cim_unit_width_cells:  1
    cim_unit_depth_cells:  1
    bits_per_cell:         2

    # Data Converters -----------------------------------------------------------------
    adc_resolution: 8
    voltage_dac_resolution: 1
    temporal_dac_resolution: 1

    n_adc_per_bank: 1

    # Hardware ------------------------------------------------------------------------
    cycle_period: 1e-9
    read_pulse_width: 1e-9

  extra_attributes_for_all_component_models:
    <<: *cim_component_attributes
    tech_node: tech_node
    cycle_period: cycle_period

  # ===================================================================================
  # Architecture
  # ===================================================================================
  nodes:

  # NOTE: THE BELOW IS NOT TESTED.

  #   {% if INCLUDE_CHIP | default(False) %}

  # # - !Container # Tile
  # #   name: SharedRouterGroup
  # #   spatial: [{name: SharedRouterGroup, fanout: 32, power_gateable: True, min_usage: 1}]

  # # - !Toll # Router: Sends data to other tiles
  # #   name: Router
  # #   subclass: IsaacRouter
  # #   extra_attributes_for_component_model: {width: 128}

  # # - !Container # Tile
  # #   name: Tile # long name so it doesn't conflict with other names
  # #   spatial: [{name: Tile, fanout: 4, power_gateable: True, min_usage: 1}]

  #   {% endif %}

  #   {% if INCLUDE_TILE | default(False) %}

  # # - !Component # eDRAM buffer serves a set of tiles
  # #   name: EDRAMBuffer
  # #   <<<: [*component_defaults]
  # #   subclass: IsaacEDRAM
  # #   size: 64 * 1024 * 8 # 64KB
  # #   constraints: {dataspace: {keep_only: [Inputs, Outputs]}}

  # # # The original ISAAC paper does not have this component, but we add it
  # # # to match the other models and let ISAAC support lower precision.
  # # - !Toll # Quantize outputs before sending them to the next tile
  # #   name: RaellaQuantEDRAM
  # #   <<<: [*component_defaults, *keep_outputs, *no_coalesce]
  # #   subclass: RaellaQuantEDRAM
  # #   extra_attributes_for_component_model:
  # #     size: 32 * 1024 * 8 # 32kB for scales
  # #     width: 16 # 16b outputs pre-quantize
  # #   # Reads are NOT per-bit here! One read should quantize one output value
  # #   bits_per_action: output.bits_per_value

  # # - !Component # Inter-tile network feeds inputs/outputs between tiles
  # #   name: InterMacroNetwork
  # #   subclass: IsaacEDRAMBus
  # #   extra_attributes_for_component_model: {width: 256}
  # #   n_instances: MacroGroup.get_fanout()
  # #   tensors: {keep: input | output, tensor_order_options: [[output, input]]}
  # #   bits_per_value: {output: 2 * output.bits_per_value} # Accumulate in 2x precision

  # # - !Container # Macro
  # #   name: MacroGroup
  # #   spatial: [{name: MacroGroup, fanout: 8, power_gateable: True}]

  #   {% endif %}

  # Input buffer
  - !Memory
    name: InputBuffer
    tensors: {keep: input}
    size: Macro.get_fanout() * array_parallel_inputs * supported_input_bits
    component_class: SmartBufferSRAM
    extra_attributes_for_component_model: {width: 64}

  # Output buffer
  - !Memory
    name: OutputBuffer
    tensors: {keep: output}
    # Max size: Number of arrays * outputs/array / (weight slices, since outputs shared
    # among weight slices) * output precision (doubled for accumulation)
    size: Macro.get_fanout() * array_parallel_outputs // min_weight_slices * supported_output_bits * 2
    component_class: SmartBufferSRAM
    bits_per_value: {output: 2 * output.bits_per_value} # Accumulate in 2x precision.
    extra_attributes_for_component_model: {width: 64}

  # Shift+add sums outputs from multiple slices.
  - !Toll
    name: ShiftAdd
    <<: [*both_sliced, *one_action_per_value]
    tensors: {keep: output}
    direction: up
    n_parallel_instances: Macro.get_fanout() # Match throughput with arrays.
    component_class: ISAACShiftAdd
    extra_attributes_for_component_model:
      n_bits: supported_output_bits
      shift_register_n_bits: supported_output_bits * 2

  # Independent array with memory elements and peripherals
  - !Container
    name: Macro
    spatial: [{name: array, fanout: 8}]

  # ADCs read analog outputs from the array and convert to digital.
  - !Toll
    name: ADC
    <<: [*both_sliced, *one_action_per_value]
    tensors: {keep: output}
    direction: up
    component_class: ADC
    energy_scale: adc_energy_scale
    leak_power_scale: adc_energy_scale
    area_scale: adc_area_scale
    extra_attributes_for_component_model:
      throughput_scale: 1 / 100 # 100 cycles to process all outputs
      throughput: 1 / cycle_period * cols_active_at_once * throughput_scale
      n_bits: adc_resolution

  # This memory catches sliding windows that may be sent spatially in the array. E.g.,
  # convolution steps spatially unrolled onto columns with overlapping windows.
  - !Memory
    name: DummyRowDriverMemory
    component_class: Dummy
    # Size = one input value per row (max number of inputs we can do in parallel)
    size: input.bits_per_value * array_parallel_inputs
    # no_resend_to_below prevents reuse across temporal iterations because this isn't
    # really a memory.
    tensors: {keep: input, no_resend_to_below: input}

  # Row drivers feed inputs onto the rows of the array.
  - !Toll
    name: RowDrivers
    <<: [*input_sliced, *one_action_per_value]
    tensors: {keep: input}
    direction: down
    component_class: ArrayRowDrivers

  # Column drivers precharge the array columns.
  - !Toll
    name: ColumnDrivers
    <<: [*both_sliced, *one_action_per_value]
    tensors: {keep: output}
    direction: up
    component_class: ArrayColumnDrivers

  - !Container
    name: MemoryCell
    spatial:
    # ARRAY_COLUMNS suffix used for used for counting the array size
    - name: columns_ARRAY_COLUMNS
      fanout: 128
      # Note: may_reuse here and not reuse because we may have columns that reuse some,
      # but not all, input values, so we want reuse to be optional and only for inputs.
      may_reuse: input
      min_usage: 1
      usage_scale: n_weight_slices
    # ARRAY_ROWS suffix used for used for counting the array size
    - name: rows_ARRAY_ROWS
      fanout: 128
      reuse: output
      min_usage: 1

  # CiM units stores weights and computes MACs. Each CiM unit stores up to
  # cim_unit_depth_cells indepedently-addressable weight slices, with up to
  # cim_unit_width_cells * cim_unit_depth_cells in a weight slice. Only one weight slice
  # can be used at a time.
  - !Memory
    name: CimUnit
    # Computes with one input slice * weight slice at a time. Computations are
    # parallelized across weight slices, and input slices are processed sequentially.
    <<: [*both_sliced_weight_slices_parallelized, *one_action_per_value]
    tensors:
      keep: weight
      # Write weights at most once
      no_refetch_from_above: weight
      # Can store values at this level longer than levels above, which lets the mapping
      # be maximally-weight-stationary (CimUnit weight storage node as high as
      # possible).
      force_memory_hierarchy_order: False
    # Each instance of this component represents n_weight_slices weight slices, meaning
    # that it holds a full weight
    size: cim_unit_width_cells * cim_unit_depth_cells * bits_per_cell
    component_class: MemoryCell
    # CimUnits represent cim_unit_width_cells * cim_unit_depth_cells memory cells tied
    # together into one weight
    extra_attributes_for_component_model:
      n_instances: cim_unit_width_cells * cim_unit_depth_cells

  # We account for compute energy and latency in other components, so just use a dummy
  # compute here.
  - !Compute
    name: FreeCompute
    component_class: Dummy
    enabled: len(All) == 3

# These variables pertain to the workload, microarch, and circuits. They should be
# matched between architectures when comparing for a fair comparison.
variables:
  inputs_hist: [0, 0, 0, 3, 1, 0, 0]
  weights_hist: [0, 1, 3, 4, 3, 1, 0]
  outputs_hist: inputs_hist

  ## Microarch ------------------------------------------------------------------------
  supported_input_bits: 8        # Maximum input bits supported by the arch
  supported_weight_bits: 8       # Maximum weight bits supported by the arch
  supported_output_bits: 8       # Maximum output bits supported by the arch
  min_supported_input_bits: 1    # Minimum input bits supported by the arch
  min_supported_weight_bits: 2   # Minimum weight bits supported by the arch
  min_supported_output_bits: 1   # Minimum output bits supported by the arch

  # Circuits --------------------------------------------------------------------------
  voltage: 1
  tech_node: 32e-9 # nm
  cell_config: "{{find_path('rram_isaac_isca_2016.yaml')}}"
  voltage_energy_scale: voltage ** 2
  voltage_latency_scale: voltage

  # Calibration -----------------------------------------------------------------------
  adc_energy_scale: 1
  adc_area_scale: 1
  row_col_drivers_area_scale: 1


# =====================================================================================
# Default Workload
# =====================================================================================
# This workload is sized to get peak throughput & energy efficiency.
workload:
  rank_sizes:
    M: 1
    N: 16 * 8
    K: 128

  einsums:
  - name: Matmul
    tensor_accesses:
    - {name: input, projection: [m, k], bits_per_value: 16}
    - {name: weight, projection: [k, n], bits_per_value: 16}
    - {name: output, projection: [m, n], output: True, bits_per_value: 16}


renames: {} # Not needed for this workload
