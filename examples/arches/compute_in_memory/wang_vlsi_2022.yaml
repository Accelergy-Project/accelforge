{{include_text('_include.yaml')}}
{{add_to_path('./memory_cells')}}

arch:
  # ===================================================================================
  # Architecture-specific variables.
  # ===================================================================================
  variables:
    # Inherit these from _include.yaml. Many definitions are included there.
    <<: *variables_global

    # Encoding-dependent parameters ---------------------------------------------------
    encoded_input_bits:  input_bits
    encoded_weight_bits: weight_bits
    encoded_output_bits: output_bits

    input_encoding_func: offset_encode_hist
    weight_encoding_func: offset_encode_hist

    # For accuracy model. Can in-array accumulation include signed values? Signed
    # accumulation not compatible with offset encoding (since offset encoding makes
    # values non-negative)
    signed_sum_across_inputs: True
    signed_sum_across_weights: False

    # Architecture & CiM Array Structure ----------------------------------------------
    # DEFINITIONS:
    # - Cell: Smallest structure capable of storing memory. Note that a cell may store
    #   more than one bit. For example, a cell consisting of a RRAM device may store >1
    #   bits, while a cell consisting of an SRAM bitcell may store only 1 bit.
    # - CiM Unit: Smallest structure capable of computing an analog MAC
    # - CiM Unit Width Cells: Number of CiM unit cells that are accessed as one. These
    #   cells receive one analog input and compute one analog MAC per timestep.
    # - CiM Unit Depth Cells: Number of independent groups of "CiM Unit Width" cells
    #   that form a CiM unit. Each of these groups is indepently addressible and
    #   operates in must be activated in a different timestep than the others.
    cim_unit_width_cells:  supported_weight_bits
    cim_unit_depth_cells:  8
    bits_per_cell:         1

    # Data Converters -----------------------------------------------------------------
    adc_resolution: 8
    voltage_dac_resolution: 8
    temporal_dac_resolution: 1
    dac_unit_resistance: 5000

    n_adc_per_bank: 16

    # Hardware ------------------------------------------------------------------------
    base_latency: 6.8e-9
    latency_columns_scale: dac_unit_resistance / 5000 * array_parallel_outputs / 16
    latency_dac_resolution_scale: voltage_dac_resolution / 8
    # Digital clock runs at 2x analog clock speed. Don't let analog clock go
    # faster than that.
    no_faster_than_digital: max(0.5, latency_columns_scale * latency_dac_resolution_scale)
    # Assume temporal DAC runs no faster than 0.05ns/step.
    limited_by_temporal_dac: 0.05e-9 * (2 ** temporal_dac_resolution - 1)
    cycle_period: max(base_latency * no_faster_than_digital * voltage_latency_scale, limited_by_temporal_dac, 2e-9)
    read_pulse_width: cycle_period

  extra_attributes_for_all_component_models:
    <<: *cim_component_attributes
    tech_node: tech_node
    cycle_period: cycle_period

  # ===================================================================================
  # Architecture
  # ===================================================================================
  nodes:
  # DAC converts digital inputs to analog voltages.
  - !Toll
    name: DAC
    <<: [*input_sliced, *one_action_per_value]
    tensors: {keep: input}
    direction: down
    component_class: DualSidedR2RLadderDAC
    n_parallel_instances: array_parallel_inputs # One DAC for each row
    extra_attributes_for_component_model:
      resolution: dac_resolution
      unit_resistance: dac_unit_resistance
      zero_between_values: 0
      bit_distribution: input_bit_distribution
      hist: hist_to_magnitude(inputs_hist)

  # This memory catches sliding windows that may be sent spatially in the array. E.g.,
  # convolution steps spatially unrolled onto columns with overlapping windows.
  - !Memory
    name: DummyRowDriverMemory
    component_class: Dummy
    # Size = one input value per row (max number of inputs we can do in parallel)
    size: input.bits_per_value * array_parallel_inputs
    # no_resend_to_below prevents reuse across temporal iterations because this isn't
    # really a memory.
    tensors: {keep: input, no_resend_to_below: input}

  # Row drivers feed inputs onto the rows of the array.
  - !Toll
    name: RowDrivers
    <<: [*input_sliced, *one_action_per_value]
    tensors: {keep: input}
    direction: down
    component_class: ArrayRowDrivers

  # Weight drivers write weights to the array.
  - !Toll
    name: WeightDrivers
    <<: [*weight_sliced, *one_action_per_value]
    tensors: {keep: weight & Above} # Only program the weights if they're not backed in the CiM units.
    direction: down
    component_class: ArrayRowDrivers
    area_scale: 17.3  # Calibrate to paper (Misc = 11% of total area).
    extra_attributes_for_component_model: {<<: [*weight_drivers_attributes]}

  # Select different sets of weights each timestep.
  - !Toll
    name: SelectWordlineDrivers
    <<: [*input_sliced, *one_action_per_value]
    tensors: {keep: input}
    direction: down
    component_class: ArrayRowDrivers
    extra_attributes_for_component_model:
      # Unlike normal row drivers, this is always fully asserted to select a row.
      average_input_value: 1

  # ADCs read analog outputs from the array and convert to digital.
  - !Toll
    name: ADC
    <<: [*both_sliced, *one_action_per_value]
    tensors: {keep: output}
    direction: up
    component_class: ADC
    energy_scale: adc_energy_scale
    leak_power_scale: adc_energy_scale
    area_scale: adc_area_scale
    extra_attributes_for_component_model:
      n_bits: adc_resolution
      throughput_scale: 1 # 1 cycle to process all outputs
      throughput: 1 / cycle_period * cols_active_at_once * throughput_scale

  # Column drivers precharge the array columns.
  - !Toll
    name: ColumnDrivers
    <<: [*both_sliced, *one_action_per_value]
    tensors: {keep: output}
    direction: up
    component_class: ArrayColumnDrivers
    actions: [{name: read, throughput: cols_active_at_once / cycle_period}]

  # Each column stores a different weight slice. Columns share inputs.
  - !Container
    name: ColumnOfSubBanks
    spatial:
    # ARRAY_COLUMNS suffix used for used for counting the array size
    - name: columns_ARRAY_COLUMNS
      fanout: 16
      usage_scale: n_weight_slices
      # Note: may_reuse here and not reuse because we may have columns that reuse some,
      # but not all, input values, so we want reuse to be optional and only for inputs.
      may_reuse: input
      min_usage: 1

  # Column bandwidth limiter to limit write speed (only one value can be written per
  # column per cycle)
  - !Toll
    name: ColumnBandwidthLimiter
    # Keep weight and output tensors. Don't keep anything if it doesn't leave the array.
    tensors: {keep: (weight | output) & Above}
    direction: {Outputs: up, ~Outputs: down}
    component_class: Dummy
    # Each time a weight slice is written to the array, consume 0.5 "bits". 0.5 because
    # the digital clock (writing weights) runs at 2x the speed of the analog clock. Each
    # time a sliced psum is read from the array, consume 1 "bit".
    bits_per_value: {weight: 0.5, output: 1}
    # One cycle period per "bit"
    actions: [{name: read, throughput: 1 / cycle_period}]

  # Each row receives a different input slice. Rows share outputs.
  - !Container
    name: SubBank
    spatial:
    # ARRAY_ROWS suffix used for used for counting the array size
    - name: rows_ARRAY_ROWS
      fanout: 64
      reuse: output
      min_usage: 1

  # CiM units stores weights and computes MACs. Each CiM unit stores up to
  # cim_unit_depth_cells indepedently-addressable weight slices, with up to
  # cim_unit_width_cells * cim_unit_depth_cells in a weight slice. Only one weight slice
  # can be used at a time.
  - !Memory
    name: CimUnit
    # Computes with one input slice * weight slice at a time. Computations are
    # parallelized across weight slices, and input slices are processed sequentially.
    <<: [*both_sliced_weight_slices_parallelized, *one_action_per_value]
    tensors:
      keep: weight
      # Write weights at most once
      no_refetch_from_above: weight
      # Can store values at this level longer than levels above, which lets the mapping
      # be maximally-weight-stationary (CimUnit weight storage node as high as
      # possible).
      force_memory_hierarchy_order: False
    # Each instance of this component represents n_weight_slices weight slices, meaning
    # that it holds a full weight
    size: cim_unit_width_cells * cim_unit_depth_cells * bits_per_cell
    component_class: MemoryCell
    # CimUnits represent cim_unit_width_cells * cim_unit_depth_cells memory cells tied
    # together into one weight
    extra_attributes_for_component_model:
      n_instances: cim_unit_width_cells * cim_unit_depth_cells

  # Digital port of the C-2C multiplier. Weights enter here.
  - !Toll
    name: C2CMultiplier
    <<: [*both_sliced, *one_action_per_value]
    tensors: {keep: input}
    direction: down
    component_class: C2CMultiplier
    extra_attributes_for_component_model: &c2c_params
      resolution:           cim_unit_width_cells
      a_hist:               inputs_hist
      b_bit_distribution:   weight_bit_distribution
      unit_capacitance:     2e-15

  # Analog port of the C-2C multiplier. Inputs enter here.
  - !Toll
    name: C2CMultiplierPortB
    <<: [*both_sliced, *one_action_per_value]
    tensors: {keep: weight}
    direction: down
    component_class: C2CMultiplierPortB
    extra_attributes_for_component_model: *c2c_params

  # We account for compute energy and latency in other components, so just use a dummy
  # compute here.
  - !Compute
    name: FreeCompute
    component_class: Dummy
    enabled: len(All) == 3
    # The column bandwidth limiter simulates sending an output down here each time the
    # free compute is used. By default we can skip the first time an output is written
    # (since the initial value is zero), but this would mess up the column bandwidth
    # limiter, so we disable it here.
    skip_initial_output_write: False

# These variables pertain to the workload, microarch, and circuits. They should be
# matched between architectures when comparing for a fair comparison.
variables:
  inputs_hist: [1, 2, 3, 4, 3, 2, 1]
  weights_hist: [1, 1, 1, 1, 1, 1, 1]
  outputs_hist: inputs_hist

  ## Microarch ------------------------------------------------------------------------
  supported_input_bits:  8       # Maximum input bits supported by the arch
  supported_weight_bits: 8       # Maximum weight bits supported by the arch
  supported_output_bits: 8       # Maximum output bits supported by the arch
  min_supported_input_bits: 8    # Minimum input bits supported by the arch
  min_supported_weight_bits: 8   # Minimum weight bits supported by the arch
  min_supported_output_bits: 8   # Minimum output bits supported by the arch

  # Circuits --------------------------------------------------------------------------
  voltage: 1
  tech_node: 22e-9 # nm
  cell_config: "{{find_path('sram_wang_vlsi_2022.yaml')}}"
  voltage_energy_scale: (voltage / 1) ** 2
  voltage_latency_scale: (0.7 / voltage) ** 1.1

  # Calibration -----------------------------------------------------------------------
  adc_energy_scale: 3.15 * voltage_energy_scale
  adc_area_scale: 0.4
  row_col_drivers_area_scale: 1


# =====================================================================================
# Default Workload
# =====================================================================================
# This workload is sized to get peak throughput & energy efficiency.
workload:
  rank_sizes:
    M: 1
    N: 16
    K: 64
    B: 1

  einsums:
  - name: Matmul
    tensor_accesses:
    - {name: input, projection: [b, m, k], bits_per_value: 8}
    - {name: weight, projection: [b, k, n], bits_per_value: 8}
    - {name: output, projection: [b, m, n], output: True, bits_per_value: 8}
renames: {} # Not needed for this workload
