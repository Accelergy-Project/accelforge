arch:
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    area: 0
    leak_power: 0
    tensors: {keep: All}
    actions:
    - {name: read, energy: 0, throughput: inf}
    - {name: write, energy: 0, throughput: inf}

  - !Memory
    name: GlobalBuffer
    size: inf
    area: 0
    leak_power: 0
    tensors: {keep: ~MainMemory, may_keep: All}
    actions:
    - {name: read, energy: 0, throughput: inf}
    - {name: write, energy: 0, throughput: inf}

  - !Network
    name: PeArray
    area: 0
    leak_power: 0
    total_latency: "max_hops"
    actions:
    - {name: hop, energy: 1, latency: 1, throughput: inf}

  - !Memory
    name: Scratchpad
    size: inf
    area: 0
    leak_power: 0
    tensors: {keep: All}
    actions:
    - {name: read, energy: 0, throughput: inf}
    - {name: write, energy: 0, throughput: inf}
    spatial:
    - {name: X, fanout: 4}

  # All-to-all switch (NVLink-like): every node is one hop from every other
  - !Network
    name: MacArray
    topology: all_to_all
    area: 0
    leak_power: 0
    actions:
    - {name: hop, energy: 1, latency: 1, throughput: inf}

  - !Compute
    name: MAC
    area: 0
    leak_power: 0
    actions:
    - {name: compute, energy: 0, throughput: inf}
    spatial:
    - {name: X, fanout: 4}
