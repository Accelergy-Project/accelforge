# Toll has both action.values_per_action and component.values_per_action.
# action wins -> vpa = 2 per tensor.
arch:
  nodes:
  - !Memory
    name: main_memory
    component_class: Dummy
    size: 1e9
    tensors: {keep: All}

  - !Toll
    name: Toll
    direction: up_and_down
    leak_power: 0
    area: 0
    tensors: {keep: All}
    values_per_action: {T0: 5, W0: 5, T1: 5}
    actions:
    - {name: read, energy: 100, latency: 0, values_per_action: {T0: 2, W0: 2, T1: 2}}

  - !Memory
    name: LocalBuffer
    component_class: Dummy
    size: 1e9
    tensors: {keep: All}

  - !Compute
    name: mac
    component_class: Dummy
