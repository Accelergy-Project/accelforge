# Only component.bits_per_action set; action inherits via default expression.
# Component bits_per_value={All:4} overrides workload bpv=8.
# Derived vpa = 16 / 4 = 4.
arch:
  nodes:
  - !Memory
    name: main_memory
    component_class: Dummy
    size: 1e9
    tensors: {keep: All}

  - !Toll
    name: Toll
    direction: up_and_down
    leak_power: 0
    area: 0
    tensors: {keep: All}
    bits_per_value: {All: 4}
    bits_per_action: 16
    actions:
    - {name: read, energy: 100, latency: 0}

  - !Memory
    name: LocalBuffer
    component_class: Dummy
    size: 1e9
    tensors: {keep: All}

  - !Compute
    name: mac
    component_class: Dummy
