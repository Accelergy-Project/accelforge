arch:
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    area: 0
    leak_power: 0
    tensors: {keep: All}
    actions:
    - {name: read, energy: 0, throughput: inf}
    - {name: write, energy: 0, throughput: inf}

  - !Array
    name: Array
    spatial:
    - {name: X, fanout: 4}
    - {name: Y, fanout: 4}
    nodes:
    - !Memory
      name: GlobalBuffer
      size: inf
      area: 0
      leak_power: 0
      tensors: {keep: ~MainMemory, may_keep: All}
      actions:
      - {name: read, energy: 0, throughput: inf}
      - {name: write, energy: 0, throughput: inf}

    - !Memory
      name: RowBuffer
      size: inf
      area: 0
      leak_power: 0
      tensors: {keep: input, may_keep: input}
      actions:
      - {name: read, energy: 5, throughput: 1}
      - {name: write, energy: 5, throughput: inf}
      spatial:
      - {name: X, fanout: 4}

    - !Memory
      name: ColumnBuffer
      size: inf
      area: 0
      leak_power: 0
      tensors: {keep: output, may_keep: output}
      actions:
      - {name: read, energy: 5, throughput: inf}
      - {name: write, energy: 5, throughput: inf}
      spatial:
      - {name: Y, fanout: 4}

    - !Memory
      name: DistributedBuffer
      size: inf
      area: 0
      leak_power: 0
      tensors: {keep: weight, may_keep: weight}
      actions:
      - {name: read, energy: 5, throughput: inf}
      - {name: write, energy: 5, throughput: inf}
      spatial:
      - {name: X, fanout: 2}
      - {name: Y, fanout: 2}

    - !Network
      name: NoC
      area: 0
      leak_power: 0
      actions:
      - {name: hops, energy: 1, throughput: inf}

  - !Memory
    name: Scratchpad
    size: inf
    area: 0
    leak_power: 0
    tensors: {keep: weight, may_keep: weight}
    actions:
    - {name: read, energy: 1, throughput: inf}
    - {name: write, energy: 1, throughput: inf}

  - !Compute
    name: MAC
    area: 0
    leak_power: 0
    actions:
    - {name: compute, energy: 1, throughput: inf}
