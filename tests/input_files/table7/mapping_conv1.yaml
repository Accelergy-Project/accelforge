
# Conv1 mapping for Eyeriss v1 (Table 7)
# Translated from Sparseloop mapping: table7_eyeriss_setup/mappings_found/alexnet_conv1.yaml
#
# Sparseloop factors â†’ AccelForge tile_shapes:
# DRAM:     Q=8â†’tile7, N=4â†’tile1, C=3â†’tile1
# shared_glb: M=3â†’tile32, P=56â†’tile1
# spatial X: Q=7â†’tile1, M=2â†’tile16 (14-way)
# spatial Y: S=11â†’tile1 (11 of 12 PEs)
# weights_spad: R=11â†’tile1
# psum_spad:    M=16â†’tile1

mapping:
  nodes:
  # === DRAM level ===
  - !Storage
    tensors: [Weights, Inputs, Outputs]
    component: DRAM

  # DRAM temporal (outerâ†’inner following Sparseloop permutation RSP CMNQ reversed)
  - !Temporal
    rank_variable: q
    tile_shape: 7
  - !Temporal
    rank_variable: n
    tile_shape: 1
  - !Temporal
    rank_variable: c
    tile_shape: 1

  # === shared_glb level ===
  - !Storage
    tensors: [Inputs, Outputs]
    component: shared_glb

  # shared_glb temporal (outerâ†’inner following Sparseloop permutation QRSC PNM reversed)
  - !Temporal
    rank_variable: m
    tile_shape: 32

  # Weights buffered at shared_glb (split: m relevant above, p irrelevant below)
  - !Storage
    tensors: [Weights]
    component: shared_glb

  - !Temporal
    rank_variable: p
    tile_shape: 1

  # shared_glb spatial â†’ 14 PEColumns (Q=7, M=2)
  - !Spatial
    rank_variable: q
    tile_shape: 1
    name: X
    component: PEColumns
  - !Spatial
    rank_variable: m
    tile_shape: 16
    name: X
    component: PEColumns

  # === DummyBuffer pass-through (all tensors) ===
  - !Toll
    tensors: [Inputs, Weights, Outputs]
    component: DummyBuffer

  # DummyBuffer spatial â†’ 11 PEs per column (S=11 out of 12)
  - !Spatial
    rank_variable: s
    tile_shape: 1
    name: Y
    component: DummyBuffer

  # === PE-level storage ===
  - !Storage
    tensors: [Inputs]
    component: ifmap_spad
  - !Storage
    tensors: [Weights]
    component: weights_spad

  # weights_spad temporal: R=11 iterations
  - !Temporal
    rank_variable: r
    tile_shape: 1

  - !Storage
    tensors: [Outputs]
    component: psum_spad

  # psum_spad temporal: M=16 iterations
  - !Temporal
    rank_variable: m
    tile_shape: 1

  # === Compute ===
  - !Compute
    einsum: Conv
    component: MACs
