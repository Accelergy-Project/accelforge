# Each tensor is shaped by a set of ranks, denoted by capital letters
# For example: Q is shaped by (B, M, H, E)
# We'll use lower-case letters to index into the ranks
# For example: Q[b, m, h, e] is the tensor Q at index (b, m, h, e)

# When making a projection list, it's equivalent to the Einsum subscript notation, so:
# Q projection [b, m, h, e] means that b indexes into B, m indexes into M...
# When making a projection dict, it's equivalent to the Einsum subscript/superscript notation, so:
# K projection { B: b, M: p, H: h, E: e } means that b indexes into B, p indexes into M...

# Renames take a tensor name and turn them into a canonical name that we can use in
# architecture constraints. For example, we want to use the words "input", "weight", and
# "output" to refer to the tensors of an Einsum, but the Einsum QK has no clear "weight"
# or "input" because both Q and K are inputs. So we rename K to be weight.

workload:
  rank_sizes:
    {% set BATCH_SIZE = BATCH_SIZE | default(1) %}
    {% set N_TOKENS = N_TOKENS | default(8192) %}
    B: {{BATCH_SIZE}}
    P: {{N_TOKENS}}
    M: {{N_TOKENS}}
    H: 32
    E: 128
    F: 128
    D: 4096 # = e * h
    C: 16384
    J: 4096
    G: 4096

  bits_per_value: {All: 8}
  persistent_tensors: weight - Intermediates

  einsums:
  - einsum: "I[b, m, d] = I_in[b, m, d]"
    is_copy_operation: True

  # This is equivalent to
  - einsum: "V[b, m, h, e] = I[b, m, d] * WV[h, e, d]"
    map: multiply
    reduce: add
  # this
  - "V[b, m, h, e] = I[b, m, d] * WV[h, e, d]"
  # I.e., map is by default multiply and reduce is by default add

  # DISCUSSION 1: should the symbol between tensors (*) change depending on map?
  # Option 1: Do I write this?
  - einsum: "V[b, m, h, e] = I[b, m, d] * WV[h, e, d]"
    map: div
    reduce: add
  # Option 2: Or this?
  - einsum: "V[b, m, h, e] = I[b, m, d] / WV[h, e, d]"
    map: div
    reduce: add
  # My preference is option 1 to simplify parsing

  # DISCUSSION 2: the answer to DISCUSSION 1 must now work for the following
  # Einsums of a softmax
  - einsum: "QK_exp[b, m, h, p] = QK[b, m, h, p]"
    map: exp
    reduce: null
  - einsum: "QK_denom[b, m, h] = QK_exp[b, m, h, p]"
    map: null 
    reduce: add
  - einsum: "QK_softmax[b, m, h, p] = QK_exp[b, m, h, p] * QK_denom[b, m, h]"
    map: div
    reduce: null

# DISCUSSION 3: the compute unit in arch specs
arch:
  nodes:
  # ...

  # How do we specify what operations are supported?
  # Option 1: a new key in Compute
  - !Compute
    name: MAC
    leak_power: 0
    area: 8.5e-10 # Fig. 6 has 14mm^2 for a 128x128. Assume MAC is 90%.
    supported_map: [multiply, exp]
    supported_reduce: [add]
    actions:
    - {name: compute, energy: 0.084e-12, latency: 1 / 1.05e9}
    enabled: len(All) == 3

  # Option 2: as arguments in the compute action. @Tanner, can we specify multiple variations of an action?
  - !Compute
    name: MAC
    leak_power: 0
    area: 8.5e-10 # Fig. 6 has 14mm^2 for a 128x128. Assume MAC is 90%.
    actions:
    - {name: compute, map: multiply, reduce: add, energy: 0.084e-12, latency: 1 / 1.05e9}
    # Can I specify another variation? A compute unit may support different types of operations, or should I model as different compute units?
    - {name: compute, map: exp, reduce: null, energy: 0.084e-12, latency: 1 / 1.05e9}
    enabled: len(All) == 3


renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates if len(All) == 3 else Inputs
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1 if len(All) == 3 else 0
